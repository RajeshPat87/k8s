apiVersion: v1
kind: LimitRange
metadata:
  name: mem-cpu-limit-range
spec:
  limits:
  - type: Container
    max:             # The "Hard Ceiling"
      cpu: "800m"
      memory: "1Gi"
    default:         # The "Auto-Fill"
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "200m"
      memory: "256Mi"