apiVersion: v1
kind: Pod
metadata:
  name: stress-test
spec:
  containers:
  - name: stress-container
    image: polinux/stress
    # The first item in 'command' is the executable. 
    # The 'args' are the flags passed to it.
    command: ["stress"] 
    args: ["--vm", "1", "--vm-bytes", "150M", "--vm-hang", "300"]
    resources:
      requests:
        memory: "150Mi"
        cpu: "100m"
      limits:
        memory: "200Mi"
        cpu: "200m"
  restartPolicy: Never