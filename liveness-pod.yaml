apiVersion: v1
kind: Pod
metadata:
  name: probe-demo
  labels:
    test: liveness
spec:
  containers:
  - name: liveness-container
    image: nginx
    ports:
    - containerPort: 80
    # Command to create a dummy health file on startup
    command: ["/bin/sh", "-c", "touch /usr/share/nginx/html/healthz; nginx -g 'daemon off;'"]
    livenessProbe:
      httpGet:
        path: /healthz
        port: 80
      initialDelaySeconds: 3
      periodSeconds: 5