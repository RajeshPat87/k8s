apiVersion: v1
kind: Pod
metadata:
  name: oom-demo
spec:
  containers:
  - name: oom-container
    image: polinux/stress
    resources:
      limits:
        memory: "300Mi"
      requests:
        memory: "50Mi"
    # This command stresses memory specifically
    command: ["stress"]
    args: ["--vm", "1", "--vm-bytes", "250M", "--vm-hang", "1"]